{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center animate-fade-in">
    <div class="col-md-5">
        <div class="card bg-dark-subtle shadow">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">Вход в аккаунт</h3>
                <form method="POST" action="/login_email">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Войти</button>
                </form>
                <div class="text-center mb-3">
                    <span>или</span>
                </div>
                <a href="/login" class="btn btn-steam w-100 justify-content-center">
                    <i class="bi bi-steam"></i> Войти через Steam
                </a>
                <div class="text-center mt-3">
                    <a href="/register" class="text-decoration-none">Нет аккаунта? Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
